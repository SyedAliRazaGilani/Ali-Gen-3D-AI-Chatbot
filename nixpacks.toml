# Railway / Nixpacks (repo-root)
# This repo is a monorepo; we deploy the Express API in ./AliGen-backend.
# Keeping this file at the repo root avoids relying on the Railway "Root directory" UI.
#
# Installs FFmpeg + downloads Rhubarb so typed chat can return mouthCues in production.
#
# Docs:
# - https://docs.railway.com/guides/monorepo
# - https://nixpacks.com/docs/configuration/file

[variables]
NIXPACKS_NODE_VERSION = "18"

[phases.setup]
nixPkgs = ["...", "ffmpeg", "curl", "unzip"]

[phases.install]
cmds = [
  "npm install -g corepack",
  "corepack enable",
  "cd AliGen-backend && yarn install",
  # Install Rhubarb lip-sync (Linux) into ./AliGen-backend/bin for runtime usage.
  "mkdir -p AliGen-backend/bin",
  "if [ ! -f AliGen-backend/bin/rhubarb ]; then curl -L -o /tmp/rhubarb.zip https://github.com/DanielSWolf/rhubarb-lip-sync/releases/download/v1.13.0/Rhubarb-Lip-Sync-1.13.0-Linux.zip && unzip -o /tmp/rhubarb.zip -d /tmp/rhubarb && cp /tmp/rhubarb/Rhubarb-Lip-Sync-1.13.0-Linux/rhubarb AliGen-backend/bin/rhubarb && chmod +x AliGen-backend/bin/rhubarb; fi",
]

[phases.build]
cmds = []

[start]
cmd = "cd AliGen-backend && yarn start"

