# Legacy Nixpacks plan file. Railway’s default builder is now Railpack, which may ignore this file.
# If you set Root Directory to AliGen-backend and use Railpack, prefer an explicit build command:
#   npm install -g corepack && corepack enable && yarn install
# (Same as root railway.toml, without `cd`.)
[variables]
NIXPACKS_NODE_VERSION = "18"

[phases.install]
cmds = [
  "npm install -g corepack",
  "corepack enable",
  "yarn install",
]

# No compile step; dependency install is enough.
[phases.build]
cmds = []
