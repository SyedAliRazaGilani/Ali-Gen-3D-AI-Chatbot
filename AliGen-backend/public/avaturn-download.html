<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avaturn GLB Downloader</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 16px;
        background: #0b0b0f;
        color: #eaeaf2;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }
      button {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
      #avaturn {
        width: 100%;
        height: 78vh;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
      }
      .hint {
        opacity: 0.85;
        font-size: 14px;
        line-height: 1.4;
      }
      .status {
        font-size: 14px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <button id="open">Open Avaturn</button>
      <button id="close" disabled>Close</button>
      <div class="status" id="status">Ready. This page will download a GLB on export.</div>
    </div>
    <div class="hint">
      Creator URL: <code>https://aligen.avaturn.dev</code>. In the creator, click <b>Export</b>. If your export type is
      <b>DataURL</b>, this page will download <code>avaturn-t2.glb</code>.
    </div>
    <div id="avaturn" hidden></div>

    <script type="module">
      import { AvaturnSDK } from "https://cdn.jsdelivr.net/npm/@avaturn/sdk/dist/index.js";

      const AVATURN_URL = "https://aligen.avaturn.dev";
      const container = document.getElementById("avaturn");
      const statusEl = document.getElementById("status");
      const openBtn = document.getElementById("open");
      const closeBtn = document.getElementById("close");

      let sdk;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function openIframe() {
        container.hidden = false;
        openBtn.disabled = true;
        closeBtn.disabled = false;
      }

      function closeIframe() {
        container.hidden = true;
        openBtn.disabled = false;
        closeBtn.disabled = true;
      }

      async function init() {
        setStatus("Initializing Avaturn…");
        sdk = new AvaturnSDK();
        await sdk.init(container, { url: AVATURN_URL });

        sdk.on("export", (data) => {
          const url = data?.url;
          if (!url) {
            setStatus("Export event received, but no url was provided.");
            return;
          }

          if (!url.startsWith("data:")) {
            setStatus("Export url is not a DataURL. Update Avaturn export type to DataURL.");
            console.log("[Avaturn export]", data);
            return;
          }

          setStatus("Export received. Downloading avaturn-t2.glb…");
          const a = document.createElement("a");
          a.href = url;
          a.download = "avaturn-t2.glb";
          document.body.appendChild(a);
          a.click();
          a.remove();
          closeIframe();
          setStatus("Downloaded avaturn-t2.glb. Move it into public/models and load it in your app.");
        });

        setStatus("Avaturn ready. Click Export in the creator when finished.");
      }

      openBtn.addEventListener("click", async () => {
        openIframe();
        if (!sdk) {
          try {
            await init();
          } catch (e) {
            console.error(e);
            setStatus("Failed to init Avaturn. Check console.");
          }
        }
      });
      closeBtn.addEventListener("click", closeIframe);
    </script>
  </body>
</html>
